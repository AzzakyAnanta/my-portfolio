<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Azzam Ananta Portfolio</title>
    <style>
        body { background: #080c10; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        h1 { color: #00c896; font-size: 3rem; }
        #chat-window { position: fixed; bottom: 20px; right: 20px; width: 300px; height: 400px; background: #0d1318; border: 1px solid #00c896; border-radius: 10px; display: flex; flex-direction: column; }
        #chat-box { flex: 1; padding: 10px; overflow-y: auto; text-align: left; font-size: 14px; }
        #chat-input { padding: 10px; background: #1a242d; border: none; color: white; }
    </style>
</head>
<body>
    <h1>AZZAM ANANTA</h1>
    <p>Teknik Informatika | Pradita University</p>

    <div id="chat-window">
        <div style="background:#00c896; color:black; padding:10px;">Asisten AI Azzam</div>
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Tanya saya...">
    </div>

    <script>
        const API_KEY = "AIzaSyBox1i9SDkKfPg2MuIQlYx8jsBOmblSNOs";
        const input = document.getElementById('chat-input');
        const box = document.getElementById('chat-box');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const text = input.value;
                box.innerHTML += `<div><b>Kamu:</b> ${text}</div>`;
                input.value = '';

                // Kirim ke Gemini
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Kamu asisten Azzam, mahasiswa TI Pradita University. Jawab pertanyaan ini: " + text }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div style="color:#00c896"><b>AI:</b> ${reply}</div>`;
                box.scrollTop = box.scrollHeight;
            }
        });
    </script>
</body>
</html>
